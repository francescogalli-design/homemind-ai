analyze_camera:
  name: Analizza Camera
  description: >
    Analizza una camera specifica con AI locale (Ollama).
    Invia alert Telegram se viene rilevata una minaccia.
  fields:
    entity_id:
      name: Camera
      description: Entità camera da analizzare (es. camera.ingresso)
      required: true
      selector:
        entity:
          domain: camera

generate_report:
  name: Genera Report Sicurezza
  description: >
    Genera e invia il report di sicurezza notturno via Telegram.
    Inviato solo se ci sono stati eventi rilevanti, a meno che forzato.

clear_alerts:
  name: Azzera Alert
  description: Cancella la coda degli alert notturni, azzera contatore e resetta notifiche.

ask_ai:
  name: Chiedi all'AI
  description: >
    Invia una domanda all'AI locale (Ollama) con il contesto completo della casa.
    La risposta viene inviata via Telegram e salvata nel sensore last_ai_answer.
  fields:
    question:
      name: Domanda
      description: La domanda da porre all'AI (in italiano)
      required: true
      example: "Chi c'è in casa? Le luci sono accese?"
      selector:
        text:

validate_plate:
  name: Verifica Targa
  description: >
    Pre-validazione ALPR: controlla con AI locale se c'è una targa
    visibile nell'immagine prima di chiamare PlateRecognizer.
    Pubblica evento homemind_plate_check con plate_visible true/false.
  fields:
    entity_id:
      name: Camera
      description: Entità camera da controllare
      required: true
      selector:
        entity:
          domain: camera
