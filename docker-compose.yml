version: '3.8'

services:
  homemind-ai:
    build: .
    container_name: homemind-ai
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - HOMEMIND_DEBUG=false
      - HA_URL=${HA_URL:-http://homeassistant.local:8123}
      - HA_TOKEN=${HA_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - WEB_SECRET_KEY=${WEB_SECRET_KEY:-change-this-secret-key}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    networks:
      - homemind-network
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: homemind-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - homemind-network

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: homemind-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - homemind-ai
    networks:
      - homemind-network

volumes:
  redis-data:

networks:
  homemind-network:
    driver: bridge
